services:
  postgres:
    image: postgres:18
    container_name: iml_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: imlcore
      POSTGRES_USER: iml
      POSTGRES_PASSWORD: iml123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iml_pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@imlid.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmindata:/var/lib/pgadmin

  minio:
    image: minio/minio:latest
    container_name: iml_minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  pgadmindata:
  miniodata: